info:
  name: Get User by ID (needs user:read)
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/users/{{user_id}}"
  headers:
    - name: Authorization
      value: "{{token_type}} {{access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `user:read`. With a normal-user token this returns **403**; with `{{admin_access_token}}` it returns 200. Swap the Authorization header to test RBAC.
