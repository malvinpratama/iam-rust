info:
  name: List Permissions (needs role:read)
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/permissions"
  headers:
    - name: Authorization
      value: "{{token_type}} {{admin_access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `role:read`. Lists every permission defined in the system.
