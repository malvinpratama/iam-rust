info:
  name: List Roles (needs role:read)
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/roles"
  headers:
    - name: Authorization
      value: "{{token_type}} {{admin_access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `role:read`. Lists roles and their permissions.
