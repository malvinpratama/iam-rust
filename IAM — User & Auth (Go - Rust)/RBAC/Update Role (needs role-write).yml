info:
  name: Update Role (needs role:write)
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{base_url}}/roles/moderator"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: "{{token_type}} {{admin_access_token}}"
  body:
    type: json
    data: |-
      {
        "description": "Updated description"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `role:write`. Updates a role's description.
