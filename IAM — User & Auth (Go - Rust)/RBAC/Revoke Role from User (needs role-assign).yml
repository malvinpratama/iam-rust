info:
  name: Revoke Role from User (needs role:assign)
  type: http
  seq: 9

http:
  method: DELETE
  url: "{{base_url}}/users/{{user_id}}/roles/admin"
  headers:
    - name: Authorization
      value: "{{token_type}} {{admin_access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `role:assign` (admin). Removes the named role (here `admin`) from `{{user_id}}`. Change the last path segment to revoke a different role.
