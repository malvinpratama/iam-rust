info:
  name: Revoke Permission from Role (needs role:write)
  type: http
  seq: 6

http:
  method: DELETE
  url: "{{base_url}}/roles/moderator/permissions/user:read"
  headers:
    - name: Authorization
      value: "{{token_type}} {{admin_access_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Requires `role:write`. Removes a permission from a role.
