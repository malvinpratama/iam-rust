meta {
  name: Reset Password
  type: http
  seq: 2
}

post {
  url: {{base_url}}/auth/password-reset
  body: json
  auth: none
}

headers {
  Content-Type: application/json
}

body:json {
  {
    "token": "{{reset_token}}",
    "new_password": "newpass12345"
  }
}

docs {
  Consumes the reset token, sets a new password, and revokes all of the user's refresh tokens.
}
