meta {
  name: Request Password Reset
  type: http
  seq: 1
}

post {
  url: {{base_url}}/auth/password-reset/request
  body: json
  auth: none
}

headers {
  Content-Type: application/json
}

body:json {
  {
    "email": "{{user_email}}"
  }
}

script:post-response {
  const b = res.getBody();
  if (b && b.dev_token) bru.setVar("reset_token", b.dev_token);
}

docs {
  Public. Outside production the reset token is returned as `dev_token` (saved to `reset_token`); in production it is emailed.
}
