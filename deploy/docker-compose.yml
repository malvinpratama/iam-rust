name: iam-rust

services:
  # ── Per-service Postgres instances (one DB per service, isolated) ──────────
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_secret}
      POSTGRES_DB: ${AUTH_POSTGRES_DB:-auth_db}
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${AUTH_POSTGRES_DB:-auth_db}"]
      interval: 3s
      timeout: 3s
      retries: 15

  postgres-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_secret}
      POSTGRES_DB: ${USER_POSTGRES_DB:-user_db}
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${USER_POSTGRES_DB:-user_db}"]
      interval: 3s
      timeout: 3s
      retries: 15

  # ── NATS JetStream (async events) ──────────────────────────────────────────
  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 15

  auth:
    image: ghcr.io/malvinpratama/iam-rust-auth:${IMAGE_TAG:-latest}
    platform: ${IMAGE_PLATFORM:-linux/amd64}
    environment:
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_SERVICE_NAME: auth
      AUTH_GRPC_PORT: ${AUTH_GRPC_PORT:-50051}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-iam-auth}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-900}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-604800}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@iam.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin12345}
      APP_ENV: ${APP_ENV:-development}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-me}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      LOGIN_MAX_FAILURES: ${LOGIN_MAX_FAILURES:-5}
      LOGIN_LOCKOUT_SECONDS: ${LOGIN_LOCKOUT_SECONDS:-900}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres-auth:
        condition: service_healthy
      nats:
        condition: service_healthy

  user:
    image: ghcr.io/malvinpratama/iam-rust-user:${IMAGE_TAG:-latest}
    platform: ${IMAGE_PLATFORM:-linux/amd64}
    environment:
      USER_DATABASE_URL: ${USER_DATABASE_URL}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_SERVICE_NAME: user
      USER_GRPC_PORT: ${USER_GRPC_PORT:-50052}
      APP_ENV: ${APP_ENV:-development}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-me}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres-user:
        condition: service_healthy
      nats:
        condition: service_healthy

  gateway:
    image: ghcr.io/malvinpratama/iam-rust-gateway:${IMAGE_TAG:-latest}
    platform: ${IMAGE_PLATFORM:-linux/amd64}
    environment:
      GATEWAY_HTTP_PORT: ${GATEWAY_HTTP_PORT:-8080}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_SERVICE_NAME: gateway
      AUTH_GRPC_ADDR: ${AUTH_GRPC_ADDR:-http://auth:50051}
      USER_GRPC_ADDR: ${USER_GRPC_ADDR:-http://user:50052}
      APP_ENV: ${APP_ENV:-development}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token-change-me}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      - auth
      - user

  # ── Observability: traces (Jaeger), metrics (Prometheus), dashboards (Grafana) ──
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata-auth:
  pgdata-user:
  natsdata:
  grafana-data:
