apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
  # NOTE: placeholders for a self-contained demo. ROTATE ALL OF THESE for real
  # use (APP_ENV=production rejects the default JWT secret / admin password).
stringData:
  POSTGRES_PASSWORD: app_secret
  JWT_SECRET: k8s-demo-jwt-secret-rotate-me-min-32-bytes
  BOOTSTRAP_ADMIN_PASSWORD: ChangeMeAdmin-2026
  INTERNAL_SERVICE_TOKEN: k8s-demo-internal-token-rotate-me
  AUTH_DATABASE_URL: postgres://app:app_secret@postgres-auth:5432/auth_db
  USER_DATABASE_URL: postgres://app:app_secret@postgres-user:5432/user_db
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  POSTGRES_USER: app
  JWT_ISSUER: iam-auth
  ACCESS_TOKEN_TTL: "900"
  REFRESH_TOKEN_TTL: "604800"
  BOOTSTRAP_ADMIN_EMAIL: admin@iam.local
  AUTH_GRPC_PORT: "50051"
  USER_GRPC_PORT: "50052"
  AUTH_GRPC_ADDR: http://auth:50051
  USER_GRPC_ADDR: http://user:50052
  GATEWAY_HTTP_PORT: "8080"
  NATS_URL: nats://nats:4222
  APP_ENV: production
  RUST_LOG: info
