# Defense-in-depth: restrict who can reach the internal services.
# Only the gateway may call auth/user; each service reaches only its own DB;
# only auth/user may reach NATS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-allow-gateway
spec:
  podSelector:
    matchLabels: { app: auth }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: gateway }
      ports:
        - { protocol: TCP, port: 50051 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-allow-gateway
spec:
  podSelector:
    matchLabels: { app: user }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: gateway }
      ports:
        - { protocol: TCP, port: 50052 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-auth-allow-auth
spec:
  podSelector:
    matchLabels: { app: postgres-auth }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: auth } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-user-allow-user
spec:
  podSelector:
    matchLabels: { app: postgres-user }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: user } }
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-allow-services
spec:
  podSelector:
    matchLabels: { app: nats }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: auth } }
        - podSelector: { matchLabels: { app: user } }
      ports:
        - { protocol: TCP, port: 4222 }
