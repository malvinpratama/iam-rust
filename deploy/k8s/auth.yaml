apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth }
  template:
    metadata:
      labels: { app: auth }
    spec:
      containers:
        - name: auth
          image: iam-rust-auth
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          ports:
            - containerPort: 50051
          readinessProbe:
            grpc: { port: 50051 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            grpc: { port: 50051 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth
spec:
  selector: { app: auth }
  ports:
    - port: 50051
      targetPort: 50051
